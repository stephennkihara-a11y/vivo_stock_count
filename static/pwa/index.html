<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Vivo Count</title>
<link rel="manifest" href="/vivo-count/pwa/manifest.webmanifest"/>
<meta name="theme-color" content="#0066cc"/>
<link rel="icon" type="image/svg+xml" href="/vivo_stock_count/static/pwa/icon.svg"/>
<link rel="stylesheet" href="/vivo_stock_count/static/pwa/styles.css"/>
</head>
<body>
<div id="app">
    <header id="app-header">
        <div class="title">Vivo Count</div>

<script type="module" src="/vivo_stock_count/static/pwa/app.js"></script>

</html>
